name: Render RMarkdown and Deploy

on:
  push:
    paths:
      - 'etl-resources/best_recorded_visual_acuity/*.csv'
      - 'etl-resources/best_recorded_visual_acuity/*.Rmd'
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
      
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
      
      - name: Install R packages
        run: |
          install.packages(c("rmarkdown", "knitr", "kableExtra", "readr", "dplyr", "bookdown", "httr"))
        shell: Rscript {0}
      
      - name: Render RMarkdown
        run: |
          rmarkdown::render(
            "etl-resources/best_recorded_visual_acuity/BRVA_protocol042126.Rmd",
            output_format = "bookdown::html_document2",
            output_file = "BRVA_protocol042126.html"
          )
        shell: Rscript {0}
      
      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          git commit -m "Auto-render HTML after CSV/Rmd update" || echo "No changes to commit"
          git push

  deploy:
    needs: render
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'etl-resources/best_recorded_visual_acuity'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
